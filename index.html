<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bezier 星轨可视化</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="galaxyCanvas"></canvas>

    <div id="controlPanel" class="glass-panel">
      <div class="control-row">
        <label class="toggle-label">
          <input type="checkbox" id="toggleLines" checked />
          <span class="toggle-text">gravity field （重力场辅助线）</span>
        </label>
        <button id="clearBtn" class="action-btn">reset（重置所有星体）</button>
        <span class="status-display"
          >t = <span class="param" id="tValue">0.000</span></span
        >
      </div>
    </div>

    <div class="tips">
      <p>double-click · 创造星体</p>
      <p>drag · 重塑星轨</p>
      <p>shift + click · 恒星爆炸</p>
    </div>

    <script src="main.js"></script>
  </body>
</html>
